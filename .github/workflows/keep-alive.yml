name: Keep Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend health endpoint
        run: |
          curl --max-time 30 -f https://sql-rag-analyst.onrender.com/health || exit 0